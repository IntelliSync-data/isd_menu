name: Update ISD Menu Fishing VietNam

on:
  push:
    branches:
      - vfo

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy isd_menu to Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script_stop: true
        script: |
          # Clone if not exists, otherwise update
          if [ ! -d ~/addons-system/isd_menu ]; then
            git clone git@github.com:IntelliSync-data/isd_menu.git ~/addons-system/isd_menu
            cd ~/addons-system/isd_menu && git checkout vfo
          else
            cd ~/addons-system/isd_menu
            git fetch origin && git reset --hard origin/vfo
          fi
          
          # Sync isd_menu directory with rsync (including deletions)
          sudo mkdir -p /opt/custom-addons/isd_menu
          sudo rsync -av --delete ~/addons-system/isd_menu/ /opt/custom-addons/isd_menu/

    - name: Update isd_menu Module
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          echo "Updating apps list..."
          sudo -u odoo /opt/odoo-venv/bin/python /opt/odoo18/odoo-bin -c /etc/odoo/odoo.conf -d ${{ secrets.VFO_DB_NAME }} -u base --stop-after-init
          echo "Updating isd_menu module..."
          sudo -u odoo /opt/odoo-venv/bin/python /opt/odoo18/odoo-bin -c /etc/odoo/odoo.conf -d ${{ secrets.VFO_DB_NAME }} -u isd_menu --stop-after-init || \
            echo "Module not installed yet (now visible in Apps list), continuing..."

    - name: Restart Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sudo systemctl restart odoo

    - name: Verify Odoo Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VFO_HOST }}
        username: ${{ secrets.VFO_USERNAME }}
        key: ${{ secrets.VFO_SSH_KEY }}
        script: |
          sleep 5
          if sudo systemctl is-active --quiet odoo; then
            echo "Odoo restarted successfully"
          else
            echo "Odoo failed to restart"
            echo "=== systemctl status ==="
            sudo systemctl status odoo --no-pager
            echo "=== Last 50 lines of Odoo log ==="
            sudo tail -n 50 /var/log/odoo/odoo.log
            exit 1
          fi